## Headless multi-instance topology for SDK dns:/// + round_robin verification.
##
## Topology (design doc §4.1, alias-locked):
##   - 1 PostgreSQL (shared state).
##   - 1 Redis (REQUIRED for sibling Notify fan-out per design R5; multi-instance
##     without Redis silently breaks Subscribe push semantics).
##   - 3 ab-config-app instances (app1/app2/app3), all sharing the *same*
##     network alias `ab-config-headless.local`. Docker's embedded DNS server
##     returns ALL aliased container IPs as separate A records — functionally
##     equivalent to a k8s Headless Service's DNS A-record list.
##   - The verifier sidecar runs *inside* this network, configures the Go SDK
##     with `dns:///ab-config-headless.local:50051`, and grpc-go's dns:///
##     resolver fans out across all 3 backends with round_robin.
##
## Caveats (design R4):
##   - Docker embedded DNS is NOT the same as k8s CoreDNS. The A-record-list
##     semantics are equivalent enough to exercise the SDK's `dns:///` LB code
##     path, but TTL behavior, srv-record support, and IP-rotation cadence
##     differ. This harness validates the SDK side; the k8s CoreDNS contract
##     must be validated separately in a real cluster.
##   - No multi-port-on-localhost fallback is allowed (design §4.1 hard
##     prohibition): that topology would bypass `dns:///` A-record fan-out and
##     pass even if SDK round_robin is wrong.
##
## Required before `docker compose up`: verify-roundrobin.sh writes
## `headless.env` from the in-tree fixture PEM (../../scripts/fixtures
## live in the *main* repo, not this SDK repo, so the script generates the
## env file at run time and points docker compose at it via --env-file).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tipsy
      POSTGRES_PASSWORD: tipsy
      POSTGRES_DB: tipsy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tipsy -d tipsy"]
      interval: 2s
      timeout: 3s
      retries: 30
    # Host port published so verify-roundrobin.sh can run goose migrations
    # from the main repo binary against this DB before seeding. Picks a
    # non-default port to avoid clashing with `~/tipsy-ab-config`'s dev-db
    # which uses 15432.
    ports:
      - "15433:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  app1: &app
    image: tipsy-ab-config-app:latest
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: "postgres://tipsy:tipsy@db:5432/tipsy?sslmode=disable"
      TIPSY_SERVICE_SECRET: "${TIPSY_SERVICE_SECRET:?TIPSY_SERVICE_SECRET required}"
      TIPSY_CHAT_JWT_PUBLIC_KEY_PEM: "${TIPSY_CHAT_JWT_PUBLIC_KEY_PEM:?PEM required}"
      TIPSY_CHAT_JWT_AUDIENCE: "dev"
      TIPSY_CHAT_JWT_ISSUER: "tipsy-backend"
      TIPSY_BACKEND_LOGIN_URL: "http://localhost:8080/login"
      TIPSY_BACKEND_LOGOUT_URL: "http://localhost:8080/logout"
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":50051"
      GRPC_REFLECTION: "true"
      LOG_LEVEL: "warn"
      REDIS_ADDR: "redis:6379"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    # Network alias: all 3 backends answer to the SAME name, exercising
    # `dns:///` A-record fan-out. This is the design §4.1-locked topology.
    networks:
      default:
        aliases:
          - ab-config-headless.local
    # Expose metrics on a distinct host port so verify-roundrobin.sh can
    # scrape each backend independently from the host.
    ports:
      - "19091:9090"

  app2:
    <<: *app
    networks:
      default:
        aliases:
          - ab-config-headless.local
    ports:
      - "19092:9090"

  app3:
    <<: *app
    networks:
      default:
        aliases:
          - ab-config-headless.local
    ports:
      - "19093:9090"

networks:
  default:
    name: tipsy-headless-net
