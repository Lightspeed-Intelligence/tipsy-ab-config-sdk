name: java-sdk

on:
  pull_request:
    paths:
      - 'sdk/java/**'
      - 'api/proto/**'
      - '.github/workflows/java-sdk.yml'
  push:
    branches: [main]
    tags: ['java-sdk/v*']

jobs:
  # Build + test the reactor on PRs and non-tag pushes to main. Skipped on tag
  # pushes (the release job below owns those).
  test:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build + test
        run: mvn -B clean test

  # Publish to Maven Central (Sonatype Central Publisher Portal) on a
  # java-sdk/vX.Y.Z tag. The `contains(github.ref, '.')` guard prevents an
  # accidental tag like `java-sdk/vexperimental` from auto-releasing (mirrors
  # the python-sdk workflow). Requires repo secrets: CENTRAL_USERNAME,
  # CENTRAL_TOKEN (Central Portal token), GPG_PRIVATE_KEY, GPG_PASSPHRASE.
  release:
    if: startsWith(github.ref, 'refs/tags/java-sdk/v') && contains(github.ref, '.')
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      # Verify the tag version (java-sdk/vX.Y.Z) matches the parent POM version
      # before publishing, so a mistagged release fails fast.
      - name: Check tag matches POM version
        run: |
          set -euo pipefail
          tag_ver="${GITHUB_REF_NAME#java-sdk/v}"
          pom_ver=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [ "$tag_ver" != "$pom_ver" ]; then
            echo "tag version ($tag_ver) != POM version ($pom_ver)" >&2
            exit 1
          fi
          echo "version OK: $pom_ver"
      - name: Deploy to Maven Central
        run: mvn deploy -B -DskipTests -Prelease
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
