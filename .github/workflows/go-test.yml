name: Go test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      # Source the in-tree module list from go.work (single source of truth in
      # this repo since go.work IS committed). jq is preinstalled on ubuntu-latest.
      - name: Discover modules
        id: modules
        run: |
          mods=$(go work edit -json | jq -r '.Use[].DiskPath' | tr '\n' ' ')
          echo "list=$mods" >> "$GITHUB_OUTPUT"

      - name: go vet
        run: |
          set -euo pipefail
          for m in ${{ steps.modules.outputs.list }}; do
            echo "==> vet $m"
            (cd "$m" && go vet ./...)
          done

      - name: go test
        run: |
          set -euo pipefail
          for m in ${{ steps.modules.outputs.list }}; do
            if [ -z "$(find "$m" -name '*_test.go' -print -quit)" ]; then
              echo "==> skip $m (no _test.go)"
              continue
            fi
            race=""
            if [ "$m" = "./sdk/go/tipsyabconfig" ]; then race="-race"; fi
            echo "==> test $m $race"
            (cd "$m" && go test ./... -count=1 $race -timeout=240s)
          done

      # proto drift check: regenerate and diff. Mismatch means either the
      # checked-in *.pb.go is stale OR the local toolchain (protoc /
      # protoc-gen-go / protoc-gen-go-grpc) differs from the canonical
      # versions documented at the top of scripts/gen-proto.sh.
      #
      # The drift step needs protoc + the two Go plugins on PATH; without them
      # scripts/gen-proto.sh aborts at its front-check. Pin the exact canonical
      # versions so regeneration is byte-reproducible (apt's protoc is too old
      # and would emit a different descriptor, producing false drift).
      - name: Install proto toolchain (pinned)
        run: |
          set -euo pipefail
          PROTOC_VERSION=34.1
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          unzip -q -o /tmp/protoc.zip -d "$HOME/.protoc"
          echo "$HOME/.protoc/bin" >> "$GITHUB_PATH"
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Proto drift check
        run: |
          protoc --version
          bash scripts/gen-proto.sh
          git diff --exit-code -- api/gen/go

  # Hermetic regression tests for the git hooks + CI watcher. Runs the
  # self-contained scripts/test-hooks.sh (fake gh + local bare remotes, no
  # network) so the self-wrap push semantics, the CI false-green guards and the
  # staged-only pre-commit can't silently regress.
  hooks-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: git identity for hook test commits
        run: |
          git config --global user.email ci@example.com
          git config --global user.name ci
      - name: run hook tests
        run: bash scripts/test-hooks.sh
