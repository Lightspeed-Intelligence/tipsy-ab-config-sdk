name: Agentic PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  pr-review:
    # Pinned to @main intentionally, to stay in lockstep with the org-wide
    # agentic-workflow-template (tipsy-backend and the other repos all track
    # @main). The template repo is org-controlled; pinning a commit SHA here
    # would fork this pair of repos off that shared baseline and require a
    # manual SHA bump on every template update. If supply-chain isolation is
    # later prioritized over lockstep, pin to a reviewed full commit SHA and
    # narrow the permissions/secrets below to what the template actually needs.
    uses: Lightspeed-Intelligence/agentic-workflow-template/.github/workflows/pr-review.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      FEISHU_WEBHOOK_TOKEN: ${{ secrets.FEISHU_WEBHOOK_TOKEN }}
    with:
      use_feishu_notify: true
